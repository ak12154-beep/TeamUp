services:
  db:
    image: postgres:16
    container_name: teamup_local_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: teamup
      POSTGRES_PASSWORD: teamup
      POSTGRES_DB: teamup
    ports:
      - "55434:5432"
    volumes:
      - teamup_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamup -d teamup"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: teamup_local_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://teamup:teamup@db:5432/teamup
      JWT_SECRET: dev_secret_change_later_please_change
      JWT_ALG: HS256
      ACCESS_TOKEN_EXPIRE_MIN: 10080
      PRIMARY_ADMIN_EMAIL: admin@teamup.kg
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080
      AUTH_COOKIE_SECURE: "false"
      AUTH_COOKIE_SAMESITE: lax
      APP_BASE_URL: http://localhost:5173
      OPENAI_API_KEY: ""
      OPENAI_MODEL: gpt-5-nano
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_FROM_EMAIL: ""
      SMTP_USE_TLS: "true"
      SMTP_USE_SSL: "false"
      VERIFICATION_CODE_TTL_MIN: "10"
      VERIFICATION_RESEND_SEC: "60"
      VERIFICATION_CODE_LENGTH: "6"
      POST_GAME_SCHEDULER_ENABLED: "true"
      POST_GAME_POLL_SECONDS: "60"
    ports:
      - "8000:80"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        BACKEND_ORIGIN: http://backend:80
    container_name: teamup_local_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  teamup_pgdata:
